version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: medcore-postgres
    environment:
      POSTGRES_USER: medcore
      POSTGRES_PASSWORD: medcore_dev
      POSTGRES_DB: medcore
    ports:
      - "5432:5432"
    volumes:
      - medcore_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medcore"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: medcore-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  medcore_pg:
